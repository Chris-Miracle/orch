name: Release Beta

on:
  push:
    branches:
      - beta

permissions:
  contents: write

jobs:
  build:
    name: Build — ${{ matrix.target }}
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            binary: orchestra
            archive: orchestra-macos-arm64.tar.gz
          - target: x86_64-apple-darwin
            binary: orchestra
            archive: orchestra-macos-x86_64.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Read version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*= "\(.*\)"/\1/')
          TAG="v${VERSION}-beta.${{ github.run_number }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --bin orchestra --target ${{ matrix.target }}

      - name: Package
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} orchestra
          tar -czf ${{ matrix.archive }} orchestra
          rm orchestra

      - name: Upload to beta pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          files: ${{ matrix.archive }}
          prerelease: true
          generate_release_notes: true
