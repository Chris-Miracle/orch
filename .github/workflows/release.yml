name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: orchestra
            archive: orchestra-macos-arm64.tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: orchestra
            archive: orchestra-macos-x86_64.tar.gz

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --bin orchestra --target ${{ matrix.target }}

      - name: Package
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} orchestra
          tar -czf ${{ matrix.archive }} orchestra
          rm orchestra

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive }}
          prerelease: true
