name: Release Stable

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build — ${{ matrix.target }}
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            binary: orchestra
            archive: orchestra-macos-arm64.tar.gz
          - target: x86_64-apple-darwin
            binary: orchestra
            archive: orchestra-macos-x86_64.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Read version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*= "\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check tag does not already exist
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG$"; then
            echo "Tag $TAG already exists — skipping release."
            echo "SKIP=true" >> "$GITHUB_ENV"
          else
            echo "SKIP=false" >> "$GITHUB_ENV"
          fi

      - uses: dtolnay/rust-toolchain@stable
        if: env.SKIP == 'false'
        with:
          targets: ${{ matrix.target }}

      - name: Build
        if: env.SKIP == 'false'
        env:
          ORCHESTRA_RELEASE_CHANNEL: stable
          ORCHESTRA_RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: cargo build --release --bin orchestra --target ${{ matrix.target }}

      - name: Package
        if: env.SKIP == 'false'
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} orchestra
          tar -czf ${{ matrix.archive }} orchestra
          rm orchestra

      - name: Upload to stable release
        if: env.SKIP == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          files: ${{ matrix.archive }}
          prerelease: false
          generate_release_notes: true
